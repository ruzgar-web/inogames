<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Customs - FEVER & PANDEMIC Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); z-index: 10; }
        .hud { font-size: 20px; color: #00ffcc; margin-bottom: 5px; font-weight: bold; }
        .money { font-size: 32px; color: #f1c40f; transition: transform 0.2s; }
        .level { font-size: 22px; color: #3498db; margin-top: 5px; font-weight: bold; }
        .perfect-counter { font-size: 22px; color: #ff9ff3; margin-top: 5px; }
        #fever-ui { font-size: 26px; color: #ff3838; font-weight: bold; margin-top: 5px; display: none; text-shadow: 0 0 10px #ff3838; animation: pulse 0.5s infinite alternate; }
        #interaction-text { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(46, 204, 113, 0.9); padding: 15px 30px; border-radius: 10px; font-size: 24px; display: none; border: 3px solid #fff; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; box-shadow: 0 0 20px rgba(0,0,0, 0.8); z-index: 10; }
        #hack-warning { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; animation: blink 1s infinite; z-index: 10; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">Galactic Terminal v14.0 (Outbreak & Fever)</div>
        <div class="hud money" id="money-display">Cash Register: <span id="money-val">0</span>$</div>
        <div id="fever-ui">🔥 FEVER MODE: DOUBLE THE WINNINGS! 🔥</div>
        <div class="level" id="level-ui">Station Rank: ⭐</div>
        <div class="perfect-counter" id="perfect-ui">The Perfect Passenger: 0/3</div>
        <div class="hud" style="color: #bbb; font-size: 16px; margin-top:10px;">WASD: Walk | F: Close | Q: Interaction</div>
    </div>
    
    <div id="hack-warning">⚠ THE SYSTEM HAS BEEN HACKED! GO TO THE SERVER (WHITE CASE) ⚠</div>
    <div id="interaction-text">PRESS THE Q KEY HERE!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiMoney = document.getElementById('money-val');
        const moneyDisplay = document.getElementById('money-display');
        const uiPerfect = document.getElementById('perfect-ui');
        const uiLevel = document.getElementById('level-ui');
        const feverUI = document.getElementById('fever-ui');
        const interactionUI = document.getElementById('interaction-text');
        const hackWarningUI = document.getElementById('hack-warning');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let gameState = 'playing'; 
        let money = 8000;
        let perfectCount = 0;
        let stationLevel = 1;
        let contrabandStock = 0; 
        let passiveIncomeTimer = 0;
        
        // COMBO / FEVER SİSTEMİ
        let comboCount = 0;
        let feverTimer = 0;

        // HACK SİSTEMİ (150 SN)
        let isHacked = false;
        let hackTargetCode = ['W', 'A', 'S', 'D'];
        let hackIndex = 0;
        let typedHack = "";
        let hackTimer = Math.floor(Math.random() * 6000) + 1000; // İlki rastgele (saniyeler içinde)

        // DEDEKTÖR BOZULMASI
        let detectorBroken = false;
        let detectorBreakTimer = Math.floor(Math.random() * 5000) + 3000;

        const DANGEROUS = ['💣', '🔫'];
        const NORMAL_LUGGAGE = [{ name: 'Banana', icon: '🍌' }, { name: 'Cola', icon: '🥤' }, { name: 'Soap', icon: '🧼' }, { name: 'Toy', icon: '🧸' }, { name: 'Book', icon: '📘' }];
        const DANGER_LUGGAGE = [{ name: 'Bomb', icon: '💣' }, { name: 'Gun', icon: '🔫' }];
        const POCKET_POOL = [{ icon: '🧨', isDangerous: true }, { icon: '🔪', isDangerous: true }, { icon: '📱', isDangerous: false }, { icon: '🔑', isDangerous: false }, { icon: '👛', isDangerous: false }, { icon: '🍬', isDangerous: false }, { icon: '🖊️', isDangerous: false }, { icon: '⌚', isDangerous: false }];

     let shopItems = [
    { id: 'shoes', name: 'Sports Shoes', desc: "You'll run faster", price: 300, bought: false },
    { id: 'belt', name: 'Turbo Motor', desc: 'Belt speeds up.', price: 500, bought: false },
    { id: 'scanner', name: 'Glasses', desc: 'Fake passport warning.', price: 800, bought: false },
    { id: 'radar', name: 'Bonus Radar', desc: 'Marks the target.', price: 1500, bought: false },
    { id: 'gold_suit', name: 'Gold Armor', desc: 'Character glows.', price: 2500, bought: false }
	];

	let horgItems = [
    { id: 'collector', name: 'Cashier Robot', desc: 'Collects money.', price: 1000, bought: false },
    { id: 'cleaner', name: 'Cleaning Robot', desc: 'Wipes the tables.', price: 1000, bought: false },
    { id: 'jukebox', name: 'Jukebox', desc: 'Coffee is drunk quickly.', price: 1500, bought: false },
    { id: 'arcade', name: 'Arcade Machine', desc: 'Passive income.', price: 2000, bought: false },
    { id: 'sec_bot', name: 'Security Bot', desc: 'Performs automatic search.', price: 5000, bought: false }
	];

	let lorgItems = [
    { id: 'moon', name: 'Moon Base', desc: 'Continuous +$500 income.', price: 50000, bought: false },
    { id: 'mars', name: 'Red Mars', desc: 'Continuous +$2,500 income.', price: 150000, bought: false },
    { id: 'nebula', name: 'Nebula Galaxy', desc: 'Continuous +$10,000 income.', price: 500000, bought: false }
	];

        const world = { width: 5000, height: 3500 };
        const camera = { x: 0, y: 0 };
        const CY = world.height / 2 - 200;
        
        const spawnPoint = { x: world.width / 2 - 1800, y: CY + 30 };
        const player = { x: world.width / 2 - 100, y: CY + 180, speed: 8, angle: 0, radius: 25, animFrame: 0 };
        let meteors = []; 

        // YANKESİCİ (HIRSIZ)
        let thief = { active: false, x: 0, y: CY + 150, speed: 18, anim: 0 };
        let thiefTimer = Math.floor(Math.random() * 3000) + 2000;

        const equip = {
            belt: { x: world.width / 2 - 1000, y: CY - 80, w: 600, h: 80 },
            scanner: { x: world.width / 2 - 800, y: CY - 90, w: 200, h: 100 },
            detector: { x: world.width / 2 - 1150, y: CY - 100, w: 80, h: 160 },
            serverDesk: { x: world.width / 2 - 250, y: CY - 60, w: 80, h: 100 }, 
            passportDesk: { x: world.width / 2 - 100, y: CY - 60, w: 100, h: 120 },
            pocketDesk: { x: world.width / 2 + 700, y: CY - 60, w: 200, h: 120 },
            
            // DÜKKANLAR VE SLOT YAN YANA AÇIKÇA DİZİLDİ (ÜST ÜSTE BİNME YOK)
            lorgDesk: { x: world.width / 2 + 50, y: CY - 220, w: 180, h: 80 }, // Bitiş: 230
            shopDesk: { x: world.width / 2 + 250, y: CY - 220, w: 180, h: 80 }, // Bitiş: 430
            slotMachine: { x: world.width / 2 + 450, y: CY - 230, w: 80, h: 100 }, // Bitiş: 530
            horgDesk: { x: world.width / 2 + 550, y: CY - 220, w: 180, h: 80 }, // Bitiş: 730
            
            vendingMachine: { x: world.width / 2 - 500, y: CY + 10, w: 60, h: 100 } // YENİ: OTOMAT
        };

        let droppedCoins = [];

        const vipPlot = { x: world.width / 2 - 600, y: CY + 300, w: 400, h: 250 };
        const interPlot = { x: world.width / 2 + 500, y: CY - 450, w: 300, h: 200 };
        const quarantinePlot = { x: world.width / 2 + 850, y: CY - 450, w: 300, h: 200 }; 

        let megaProjects = {
            statue: { x: world.width / 2 + 1000, y: CY + 200, w: 300, h: 300, built: false, price: 5000 },
            aquarium: { x: world.width / 2 + 1400, y: CY + 350, w: 400, h: 200, built: false, price: 15000 },
            hotel: { x: world.width / 2 + 1400, y: CY - 100, w: 600, h: 400, built: false, price: 20000 }
        };

        let fishes = Array.from({length: 8}, () => ({ x: Math.random()*380, y: Math.random()*180, speed: 0.5 + Math.random(), size: 5 + Math.random()*5, color: ['#e84393', '#00ffcc', '#f1c40f'][Math.floor(Math.random()*3)] }));

        let cafeBuilt = false; let arcadeTimer = 0; let vendingTimer = 0;
        const cafePlot = { x: world.width / 2 + 100, y: CY + 400, w: 700, h: 350 };
        let tables = [];
        for(let i=0; i<4; i++) { tables.push({ id: i, x: cafePlot.x + 200 + (i%2)*300, y: cafePlot.y + 120 + Math.floor(i/2)*150, state: 'empty', timer: 0, wTarget: false, tipAmount: 50 }); }
        
        let workers = {
            collector: { x: cafePlot.x + 50, y: cafePlot.y + 50, target: null, speed: 5, actionTimer: 0 },
            cleaner: { x: cafePlot.x + 650, y: cafePlot.y + 50, target: null, speed: 5, actionTimer: 0 },
            securityBot: { x: equip.detector.x + 40, y: equip.detector.y - 150, target: null, speed: 8, actionTimer: 0 }
        };

        let police = { active: false, x: spawnPoint.x, y: spawnPoint.y, state: 'none', animFrame: 0, targetX: 0, targetY: 0, timer: 0, bubbleText: null };
        let backgroundStars = Array.from({length: 200}, () => ({ x: Math.random()*3000, y: Math.random()*200, speed: 0.5 + Math.random()*2, size: Math.random()*3 }));

        const qZones = {
            scanner: { x: equip.scanner.x + equip.scanner.w / 2, y: equip.scanner.y + equip.scanner.h + 40 },
            server: { x: equip.serverDesk.x + equip.serverDesk.w / 2, y: equip.serverDesk.y + equip.serverDesk.h + 40 },
            detectorFix: { x: equip.detector.x + equip.detector.w / 2, y: equip.detector.y + equip.detector.h + 40 },
            passport: { x: equip.passportDesk.x + equip.passportDesk.w / 2, y: equip.passportDesk.y + equip.passportDesk.h + 40 },
            pocket: { x: equip.pocketDesk.x + equip.pocketDesk.w / 2, y: equip.pocketDesk.y + equip.pocketDesk.h + 40 },
            lorg: { x: equip.lorgDesk.x + equip.lorgDesk.w / 2, y: equip.lorgDesk.y + equip.lorgDesk.h + 40 },
            shop: { x: equip.shopDesk.x + equip.shopDesk.w / 2, y: equip.shopDesk.y + equip.shopDesk.h + 40 },
            slot: { x: equip.slotMachine.x + equip.slotMachine.w / 2, y: equip.slotMachine.y + equip.slotMachine.h + 40 },
            horg: { x: equip.horgDesk.x + equip.horgDesk.w / 2, y: equip.horgDesk.y + equip.horgDesk.h + 40 },
            cafeBuild: { x: cafePlot.x + cafePlot.w / 2, y: cafePlot.y + cafePlot.h / 2 },
            statueBuild: { x: megaProjects.statue.x + megaProjects.statue.w/2, y: megaProjects.statue.y + megaProjects.statue.h/2 },
            aquaBuild: { x: megaProjects.aquarium.x + megaProjects.aquarium.w/2, y: megaProjects.aquarium.y + megaProjects.aquarium.h/2 },
            hotelBuild: { x: megaProjects.hotel.x + megaProjects.hotel.w/2, y: megaProjects.hotel.y + megaProjects.hotel.h/2 }
        };

        let beltOffset = 0; let beltSpeed = 2.5;
        const citizens = []; 
        const citizenColors = ['#e84393', '#0984e3', '#6c5ce7', '#fdcb6e', '#d63031', '#00b894'];
        const shapes = ['circle', 'square'];
        
        let scannerOccupied = false; let currentScanningCitizen = null; let luggageState = 'none'; 
        let passportOccupied = false; let currentPassportCitizen = null;
        let pocketOccupied = false; let currentPocketCitizen = null;

        const keys = { w: false, a: false, s: false, d: false };
        let mouseX = 0, mouseY = 0; let activeQZone = null;
        
        const bonusRoom = { x: 10000, y: 10000, w: 2000, h: 2000, radius: 750 };
        let preBonusPos = { x: 0, y: 0 };
        let bonusCrowd = []; let bonusTarget = null; let activeBonusTargetHover = null;
        
        let slideX = -window.innerWidth; let transitionTimer = 0; let pendingGameState = '';

        function updateLevelUI() { uiLevel.innerText = "Station Rank: " + "⭐".repeat(stationLevel); }

        updateMoneyUI(0);
        updateLevelUI();

        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        
        window.addEventListener('keydown', (e) => { 
            const k = e.key.toUpperCase(); 
            const kLow = e.key.toLowerCase();
            if (keys.hasOwnProperty(kLow)) keys[kLow] = true; 
            
            if (gameState === 'hack_screen') {
                const validKeys = ['W', 'A', 'S', 'D'];
                if (validKeys.includes(k)) {
                    if (k === hackTargetCode[hackIndex]) {
                        typedHack += k + " ";
                        hackIndex++;
                        if (hackIndex >= hackTargetCode.length) { 
                            isHacked = false; updateMoneyUI(1000); gameState = 'playing'; 
                            hackWarningUI.style.display = 'none'; typedHack = ""; hackIndex = 0;
                        }
                    } else { typedHack = ""; hackIndex = 0; }
                }
                return;
            }

if (kLow === 'q') {
                if (gameState === 'playing' && activeQZone) {
                    if (activeQZone === 'server' && isHacked) { gameState = 'hack_screen'; typedHack = ""; hackIndex = 0; }
                    else if (activeQZone === 'detectorFix' && detectorBroken) { detectorBroken = false; updateMoneyUI(100); }
                    else if (activeQZone === 'slot' && contrabandStock > 0) {
                        contrabandStock--; let r = Math.random();
                        if (r < 0.3) { updateMoneyUI(1500); } else if (r < 0.6) { player.speed = 15; setTimeout(()=>player.speed=8, 8000); }
                    }
                    else if (activeQZone.startsWith('alarm_')) { let c = citizens.find(cit => cit.id === parseFloat(activeQZone.split('_')[1])); if (c) { c.state = 'walking_to_scanner'; c.bubbleText = "I'm clean!"; updateMoneyUI(50); } }
                    else if (activeQZone.startsWith('vip_')) { let c = citizens.find(cit => cit.id === parseFloat(activeQZone.split('_')[1])); if (c) { updateMoneyUI(800); c.state = 'walking_out_final'; c.bubbleText = "Excellent VIP service!"; } }
                    else if (activeQZone.startsWith('inter_')) { let c = citizens.find(cit => cit.id === parseFloat(activeQZone.split('_')[1])); if (c) { updateMoneyUI(Math.floor(Math.random()*1000)+1500); c.state = 'walking_out_final'; c.bubbleText = "Forgive me!"; } }
                    else if (activeQZone.startsWith('quar_')) { let c = citizens.find(cit => cit.id === parseFloat(activeQZone.split('_')[1])); if (c) { updateMoneyUI(500); c.state = 'walking_out_final'; c.bubbleText = "I'm cured!"; } }
                    else if (activeQZone === 'cafeBuild') { if (money >= 1000) { updateMoneyUI(-1000); cafeBuilt = true; activeQZone = null; } }
                    else if (activeQZone === 'statueBuild') { if (money >= megaProjects.statue.price) { updateMoneyUI(-megaProjects.statue.price); megaProjects.statue.built = true; activeQZone = null; stationLevel += 1; updateLevelUI(); } }
                    else if (activeQZone === 'hotelBuild') { if (money >= megaProjects.hotel.price) { updateMoneyUI(-megaProjects.hotel.price); megaProjects.hotel.built = true; activeQZone = null; stationLevel += 2; updateLevelUI(); } }
                    else if (activeQZone === 'aquaBuild') { if (money >= megaProjects.aquarium.price) { updateMoneyUI(-megaProjects.aquarium.price); megaProjects.aquarium.built = true; activeQZone = null; stationLevel += 1; updateLevelUI(); } }
                    else if (activeQZone.startsWith('table_')) { let t = tables[parseInt(activeQZone.split('_')[1])]; if (t.state === 'dirty_money') { updateMoneyUI(t.tipAmount); t.state = 'dirty'; } else if (t.state === 'dirty') t.state = 'empty'; } 
                    else if (activeQZone === 'xray' && isHacked) { /* Hackliyken açılmaz*/ }
                    else if (activeQZone === 'passport' && isHacked) { /* Hackliyken açılmaz */ }
                    else if (['xray', 'passport', 'pocket', 'shop', 'horg', 'lorg'].includes(activeQZone)) {
                        gameState = activeQZone + '_screen'; 
                        if (gameState === 'passport_screen' && currentPassportCitizen) currentPassportCitizen.quarantineUnlocked = false;
                    }
                } else if (gameState === 'bonus_playing' && activeBonusTargetHover) checkBonusTarget(activeBonusTargetHover);
            }
            if (kLow === 'f' && !['playing', 'bonus_playing', 'transition_in', 'transition_wait', 'transition_out', 'hack_screen'].includes(gameState)) gameState = 'playing';
        });
        
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; });

        canvas.addEventListener('click', (e) => {
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            
            // YANKESİCİ (HIRSIZ) YAKALAMA
            if (gameState === 'playing' && thief.active) {
                let worldX = player.x + (mouseX - cx);
                let worldY = player.y + (mouseY - cy);
                if (Math.hypot(worldX - thief.x, worldY - thief.y) < 50) {
                    thief.active = false;
                    updateMoneyUI(500);
                    const pop = document.createElement('div'); pop.innerText = "YOU'RE CAUGHT!"; pop.style.position = 'absolute'; pop.style.top = mouseY + 'px'; pop.style.left = mouseX + 'px'; pop.style.color = '#fff'; pop.style.fontSize = '24px'; pop.style.fontWeight = 'bold'; document.body.appendChild(pop); setTimeout(()=>pop.remove(), 1000);
                }
            }

            if (gameState === 'xray_screen') {
                if (mouseX > cx - 220 && mouseX < cx - 20 && mouseY > cy + 80 && mouseY < cy + 160) makeXrayDecision(true);  
                if (mouseX > cx + 20 && mouseX < cx + 220 && mouseY > cy + 80 && mouseY < cy + 160) makeXrayDecision(false); 
            }
            else if (gameState === 'passport_screen' && currentPassportCitizen) {
                let faceX = cx - 180, faceY = cy - 30;
                if (mouseX > faceX - 60 && mouseX < faceX + 60 && mouseY > faceY - 60 && mouseY < faceY + 60) {
                    currentPassportCitizen.quarantineUnlocked = true;
                }

                if (currentPassportCitizen.isBribing) {
                    if (mouseX > cx - 220 && mouseX < cx - 20 && mouseY > cy + 130 && mouseY < cy + 190) { 
                        if (Math.random() < 0.3) { 
                            currentPassportCitizen.bubbleText = "Oh no! Plainclothes cops!"; 
                            police.active = true; police.x = spawnPoint.x - 500; police.y = spawnPoint.y; police.state = 'approaching'; police.bubbleText = "STIRRING!";
                        } else { updateMoneyUI(400); currentPassportCitizen.bubbleText = "You're my guy."; }
                        currentPassportCitizen.isBribing = false; currentPassportCitizen.state = 'walking_to_pockets'; gameState = 'playing'; passportOccupied = false; currentPassportCitizen = null;
                    }
                    if (mouseX > cx + 20 && mouseX < cx + 220 && mouseY > cy + 130 && mouseY < cy + 190) { currentPassportCitizen.isBribing = false; currentPassportCitizen.bubbleText = "Oh no!"; }
                } else {
                    if (mouseX > cx - 220 && mouseX < cx - 20 && mouseY > cy + 130 && mouseY < cy + 190) makePassportDecision(true);  
                    
                    if (mouseX > cx + 20 && mouseX < cx + 220 && mouseY > cy + 130 && mouseY < cy + 190) {
                        if (currentPassportCitizen.quarantineUnlocked) {
                            if (currentPassportCitizen.type === 'zombie') {
                                currentPassportCitizen.state = 'walking_to_quarantine';
                                currentPassportCitizen.bubbleText = "Finally, treatment...";
                                handleCombo(true); // Doğru Karantina hamlesi combo sayılır
                            } else {
                                updateMoneyUI(-100);
                                currentPassportCitizen.state = 'walking_out_rej';
                                currentPassportCitizen.bubbleText = "I'm not sick, you crazy person!";
                                handleCombo(false);
                            }
                            gameState = 'playing'; passportOccupied = false; currentPassportCitizen = null;
                        } else { makePassportDecision(false); }
                    } 
                }
            }
            else if (gameState === 'pocket_screen') {
                if (currentPocketCitizen) {
                    const items = currentPocketCitizen.pocketItems; const positions = [cx - 150, cx, cx + 150];
                    for (let i = 0; i < 3; i++) {
                        if (!items[i].confiscated && Math.hypot(mouseX - positions[i], mouseY - (cy - 30)) < 40) {
                            if (items[i].isDangerous) { items[i].confiscated = true; updateMoneyUI(50 * currentPocketCitizen.mult); contrabandStock++; }
                            else { updateMoneyUI(-10 * currentPocketCitizen.mult); currentPocketCitizen.isPerfect = false; }
                        }
                    }
                    if (items.some(i => i.isDangerous && i.confiscated)) {
                        if (mouseX > cx - 220 && mouseX < cx - 20 && mouseY > cy + 80 && mouseY < cy + 140) { 
                            currentPocketCitizen.state = 'walking_to_interrogation'; currentPocketCitizen.bubbleText = "What's going on?!";
                            gameState = 'playing'; pocketOccupied = false; currentPocketCitizen = null; return;
                        }
                        if (mouseX > cx + 20 && mouseX < cx + 220 && mouseY > cy + 80 && mouseY < cy + 140) sendPocketCitizen(); 
                    } else {
                        if (mouseX > cx - 100 && mouseX < cx + 100 && mouseY > cy + 80 && mouseY < cy + 140) sendPocketCitizen();
                    }
                }
            }
            else if (gameState === 'shop_screen') {
                for (let i = 0; i < shopItems.length; i++) { let boxY = cy - 200 + (i * 65); if (mouseX > cx - 200 && mouseX < cx + 200 && mouseY > boxY && mouseY < boxY + 50) buyItem(shopItems, i); }
                let btnY = cy + 140; if (mouseX > cx - 200 && mouseX < cx + 200 && mouseY > btnY && mouseY < btnY + 40) { if (contrabandStock > 0) { updateMoneyUI(contrabandStock * 300); contrabandStock = 0; } }
            }
            else if (gameState === 'horg_screen') {
                for (let i = 0; i < horgItems.length; i++) { let boxY = cy - 180 + (i * 70); if (mouseX > cx - 200 && mouseX < cx + 200 && mouseY > boxY && mouseY < boxY + 60) buyItem(horgItems, i); }
            }
            else if (gameState === 'lorg_screen') {
                for (let i = 0; i < lorgItems.length; i++) { let boxY = cy - 180 + (i * 70); if (mouseX > cx - 200 && mouseX < cx + 200 && mouseY > boxY && mouseY < boxY + 60) buyItem(lorgItems, i); }
            }
        });

        function buyItem(list, index) { let item = list[index]; if (!item.bought && money >= item.price) { updateMoneyUI(-item.price); item.bought = true; if (item.id === 'shoes') player.speed = 12; if (item.id === 'belt') beltSpeed = 5; } }

        function handleCombo(isSuccess) {
            if (isSuccess) {
                comboCount++;
                if (comboCount >= 5) {
                    feverTimer = 900; // 15 Saniye (60 fps * 15)
                    comboCount = 0;
                    feverUI.style.display = 'block';
                    document.body.style.boxShadow = "inset 0 0 100px #f1c40f";
                }
            } else {
                comboCount = 0;
            }
        }

        class Citizen {
            constructor() {
                this.x = spawnPoint.x; this.y = spawnPoint.y;
                this.color = citizenColors[Math.floor(Math.random()*citizenColors.length)];
                this.shape = shapes[Math.floor(Math.random()*shapes.length)];
                
                this.type = 'normal';
                let r = Math.random();
                // Zombiler %15'e çıktı
                if (r < 0.15) this.type = 'zombie';
                else if (r < 0.25) this.type = 'spy';
