<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Plumber - 40 Levels & Bullet Chain Edition</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #0c1020; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; color: white; 
            font-family: sans-serif; overflow: hidden; 
        }
        canvas { 
            background: linear-gradient(to bottom, #0f1c3f, #1b325f); 
            border: 4px solid #34495e; border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
            image-rendering: pixelated;
        }
        #ui { display: flex; width: 900px; justify-content: space-between; margin-bottom: 8px; }
        .info { font-size: 1.5rem; font-weight: bold; font-family: monospace; text-shadow: 2px 2px #000; }
        p { color: #bdc3c7; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="levelText" class="info" style="color: #e74c3c;">LEVEL 1</div>
        <div id="scoreText" class="info" style="color: #f1c40f;">STATUS: GAME STARTED</div>
    </div>
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <p>🎮 Arrow Keys: Move / Jump | Jump on top of Bullet Bills to get a boost and reach the top of the Mega Turret!</p>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelTextUI = document.getElementById('levelText');
    const scoreTextUI = document.getElementById('scoreText');

    let currentLevel = 1;
    let isDead = false;
    let frameCount = 0; 

    // Mario Speed and Physics (x2 Speed)
    const player = {
        x: 60, y: 350, width: 32, height: 48,
        speed: 6.0, dx: 0, dy: 0, gravity: 0.23, jumpPower: -9.5, grounded: false
    };

    const keys = { ArrowRight: false, ArrowLeft: false, ArrowUp: false };

    let platforms = [], enemies = [], piranhas = [], particles = [], lasers = [], turrets = [], boss = null, warnings = []; 

    function spawnParticles(x, y, color, count = 15, explosive = false) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * (explosive ? 9 : 4),
                dy: (Math.random() - 0.5) * (explosive ? 9 : 4) - (explosive ? 2 : 0),
                radius: Math.random() * 4 + 1.5, color: color, alpha: 1, decay: Math.random() * 0.02 + 0.015
            });
        }
    }

    function createGoomba(x, y, range = 100) {
        return { type: 'goomba', x: x, y: y, width: 34, height: 32, startX: x, range: range, dx: 1.5, isSquished: false, squishTimer: 0 };
    }

    function createBomb(x, y, minX, maxX) {
        return { type: 'bomb', x: x, y: y, width: 30, height: 30, dx: 1.0, isActive: false, minX: minX, maxX: maxX };
    }

    function createPiranha(x, baseY) {
        return { x: x, baseY: baseY, y: baseY, width: 36, height: 50, frameOffset: Math.floor(Math.random() * 200), isOut: false };
    }

    // Bullet Bill
    function createBulletBill(x, y, dir) {
        return { type: 'bullet', x: x, y: y, width: 36, height: 26, dx: dir * 3.5, isFalling: false };
    }

    function loadLevel(levelNum) {
        isDead = false; player.dx = 0; player.dy = 0; player.x = 60; player.y = 350;
        lasers = []; boss = null; enemies = []; piranhas = []; turrets = []; warnings = [];
        levelTextUI.innerText = "LEVEL " + levelNum;
        scoreTextUI.innerText = "STATUS: FULL HEALTH";

        // Levels 1-20
        if (levelNum === 1) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' }, { x: 300, y: 360, width: 120, height: 20, type: 'block' } ]; }
        else if (levelNum === 2) { platforms = [ { x: 0, y: 460, width: 300, height: 40, type: 'ground' }, { x: 380, y: 370, width: 100, height: 20, type: 'block' }, { x: 560, y: 460, width: 340, height: 40, type: 'ground' } ]; }
        else if (levelNum === 3) { platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 280, y: 370, width: 80, height: 20, type: 'block' }, { x: 420, y: 290, width: 80, height: 20, type: 'block' }, { x: 580, y: 460, width: 320, height: 40, type: 'ground' } ]; enemies = [createGoomba(650, 420, 100)]; }
        else if (levelNum === 4) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 230, y: 360, width: 100, height: 20, type: 'block' }, { x: 400, y: 280, width: 100, height: 20, type: 'block' }, { x: 570, y: 360, width: 100, height: 20, type: 'block' }, { x: 740, y: 460, width: 160, height: 40, type: 'ground' } ]; }
        else if (levelNum === 5) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 230, y: 380, width: 70, height: 20, type: 'block' }, { x: 360, y: 310, width: 70, height: 20, type: 'block' }, { x: 490, y: 250, width: 70, height: 20, type: 'block' }, { x: 620, y: 270, width: 80, height: 20, type: 'block' }, { x: 760, y: 360, width: 140, height: 140, type: 'ground' } ]; enemies = [createGoomba(230, 340, 40)]; }
        else if (levelNum === 6) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' }, { x: 250, y: 340, width: 400, height: 20, type: 'block' } ]; enemies = [createGoomba(300, 300, 150), createGoomba(500, 420, 200)]; }
        else if (levelNum === 7) { platforms = [ { x: 0, y: 460, width: 220, height: 40, type: 'ground' }, { x: 320, y: 360, width: 70, height: canvas.height - 360, type: 'pipe' }, { x: 520, y: 340, width: 70, height: canvas.height - 340, type: 'pipe' }, { x: 720, y: 460, width: 180, height: 40, type: 'ground' } ]; }
        else if (levelNum === 8) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 260, y: 360, width: 80, height: canvas.height - 360, type: 'pipe' }, { x: 460, y: 290, width: 80, height: canvas.height - 290, type: 'pipe' }, { x: 680, y: 460, width: 220, height: 40, type: 'ground' } ]; enemies = [createGoomba(700, 420, 100)]; }
        else if (levelNum === 9) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' }, { x: 200, y: 330, width: 500, height: 20, type: 'block' } ]; enemies = [createGoomba(300, 420, 100), createGoomba(600, 420, 100), createGoomba(250, 290, 100), createGoomba(500, 290, 100)]; }
        else if (levelNum === 10) {
            levelTextUI.innerText = "⚡ LEVEL 10: ROBOT BOSS ⚡";
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            boss = { type: 'robot', x: 390, y: -100, width: 120, height: 130, hp: 3, maxHp: 3, state: 'intro', stateTimer: 45, attackPhase: 0, slamCount: 0, invulnTimer: 0 };
        }
        else if (levelNum === 11) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 220, y: 390, width: 60, height: 20, type: 'block' }, { x: 340, y: 330, width: 60, height: 20, type: 'block' }, { x: 460, y: 270, width: 60, height: 20, type: 'block' }, { x: 590, y: 460, width: 310, height: 40, type: 'ground' } ]; enemies = [createGoomba(620, 420, 150)]; }
        else if (levelNum === 12) { platforms = [ { x: 0, y: 460, width: 220, height: 40, type: 'ground' }, { x: 300, y: 360, width: 70, height: canvas.height - 360, type: 'pipe' }, { x: 490, y: 360, width: 70, height: canvas.height - 360, type: 'pipe' }, { x: 680, y: 460, width: 220, height: 40, type: 'ground' } ]; piranhas = [createPiranha(317, 360), createPiranha(507, 360)]; }
        else if (levelNum === 13) { platforms = [ { x: 0, y: 460, width: 120, height: 40, type: 'ground' }, { x: 200, y: 370, width: 80, height: 20, type: 'block' }, { x: 350, y: 370, width: 80, height: 20, type: 'block' }, { x: 500, y: 370, width: 80, height: 20, type: 'block' }, { x: 650, y: 370, width: 80, height: 20, type: 'block' }, { x: 780, y: 460, width: 120, height: 40, type: 'ground' } ]; }
        else if (levelNum === 14) { platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 280, y: 340, width: 60, height: canvas.height - 340, type: 'pipe' }, { x: 440, y: 460, width: 160, height: 40, type: 'ground' }, { x: 680, y: 330, width: 60, height: canvas.height - 330, type: 'pipe' }, { x: 800, y: 460, width: 100, height: 40, type: 'ground' } ]; enemies = [createGoomba(450, 420, 100)]; piranhas = [createPiranha(692, 330)]; }
        else if (levelNum === 15) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' }, { x: 300, y: 360, width: 300, height: 20, type: 'block' }, { x: 350, y: 280, width: 200, height: 20, type: 'block' } ]; enemies = [createGoomba(360, 240, 100), createGoomba(100, 420, 150), createGoomba(650, 420, 150)]; }
        else if (levelNum === 16) { platforms = [ { x: 0, y: 460, width: 100, height: 40, type: 'ground' }, { x: 200, y: 360, width: 70, height: canvas.height - 360, type: 'pipe' }, { x: 390, y: 300, width: 70, height: canvas.height - 300, type: 'pipe' }, { x: 580, y: 360, width: 70, height: canvas.height - 360, type: 'pipe' }, { x: 760, y: 460, width: 140, height: 40, type: 'ground' } ]; piranhas = [createPiranha(217, 360), createPiranha(407, 300), createPiranha(597, 360)]; }
        else if (levelNum === 17) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 200, y: 270, width: 500, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ]; enemies = [createGoomba(250, 230, 400)]; }
        else if (levelNum === 18) { platforms = [ { x: 0, y: 460, width: 180, height: 40, type: 'ground' }, { x: 240, y: 390, width: 80, height: 20, type: 'block' }, { x: 120, y: 300, width: 80, height: 20, type: 'block' }, { x: 300, y: 220, width: 80, height: 20, type: 'block' }, { x: 500, y: 160, width: 80, height: 20, type: 'block' }, { x: 660, y: 350, width: 70, height: canvas.height - 350, type: 'pipe' }, { x: 790, y: 460, width: 110, height: 40, type: 'ground' } ]; piranhas = [createPiranha(677, 350)]; }
        else if (levelNum === 19) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ]; enemies = [createGoomba(300, 420, 40), createGoomba(400, 420, 40), createGoomba(500, 420, 40), createGoomba(600, 420, 40)]; }
        else if (levelNum === 20) {
            levelTextUI.innerText = "⚡ LEVEL 20: DRILL BOSS ⚡";
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            boss = { type: 'drill', x: 50, y: 360, width: 80, height: 100, hp: 3, maxHp: 3, state: 'intro', stateTimer: 60, thrustsLeft: 0, currentThrust: 0, thrustDuration: 60, targetX: 0, facing: 1, invulnTimer: 0 };
        }
        // 21-30: BOMBS
        else if (levelNum === 21) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ]; enemies = [createBomb(600, 430, 0, 900)]; }
        else if (levelNum === 22) { platforms = [ { x: 0, y: 460, width: 250, height: 40, type: 'ground' }, { x: 350, y: 360, width: 200, height: 20, type: 'block' }, { x: 650, y: 460, width: 250, height: 40, type: 'ground' } ]; enemies = [createBomb(400, 330, 350, 550)]; }
        else if (levelNum === 23) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' }, { x: 400, y: 300, width: 100, height: 20, type: 'block' } ]; enemies = [createBomb(700, 430, 0, 900), createGoomba(410, 260, 80)]; }
        else if (levelNum === 24) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 250, y: 360, width: 80, height: canvas.height - 360, type: 'pipe' }, { x: 450, y: 280, width: 80, height: canvas.height - 280, type: 'pipe' }, { x: 650, y: 460, width: 250, height: 40, type: 'ground' } ]; piranhas = [createPiranha(267, 360)]; enemies = [createBomb(750, 430, 650, 900)]; }
        else if (levelNum === 25) { platforms = [ { x: 0, y: 460, width: 250, height: 40, type: 'ground' }, { x: 350, y: 380, width: 150, height: 20, type: 'block' }, { x: 550, y: 320, width: 150, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ]; enemies = [createBomb(370, 350, 350, 500)]; }
        else if (levelNum === 26) { platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 300, y: 360, width: 60, height: 20, type: 'block' }, { x: 450, y: 280, width: 60, height: 20, type: 'block' }, { x: 600, y: 360, width: 60, height: 20, type: 'block' }, { x: 700, y: 460, width: 200, height: 40, type: 'ground' } ]; enemies = [createGoomba(450, 240, 50), createBomb(800, 430, 700, 900)]; }
        else if (levelNum === 27) { platforms = [ { x: 0, y: 460, width: 300, height: 40, type: 'ground' }, { x: 400, y: 380, width: 100, height: 20, type: 'block' }, { x: 550, y: 300, width: 100, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ]; enemies = [createBomb(570, 270, 550, 650)]; }
        else if (levelNum === 28) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ]; piranhas = [createPiranha(300, 460), createPiranha(600, 460)]; enemies = [createBomb(450, 430, 0, 900), createGoomba(750, 420, 100)]; }
        else if (levelNum === 29) { platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 250, y: 380, width: 400, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ]; enemies = [createBomb(300, 350, 250, 650)]; }
        else if (levelNum === 30) {
            levelTextUI.innerText = "💥 LEVEL 30: BOMB KING 💥";
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            boss = { type: 'bombKing', x: 600, y: 300, width: 100, height: 100, hp: 4, maxHp: 4, state: 'idle', stateTimer: 60, invulnTimer: 0 };
        }
        // 31-40: TURRETS AND PLATFORMS
        else if (levelNum === 31) { platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ]; enemies = [createGoomba(400, 420, 200)]; }
        else if (levelNum === 32) { 
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            turrets = [ { x: 800, y: 400, w: 40, h: 60, dir: -1, timer: 60, cooldown: 180 } ];
        }
        else if (levelNum === 33) { 
            platforms = [ { x: 0, y: 460, width: 250, height: 40, type: 'ground' }, { x: 400, y: 360, width: 100, height: 20, type: 'block' }, { x: 650, y: 460, width: 250, height: 40, type: 'ground' } ]; 
            turrets = [ { x: 800, y: 400, w: 40, h: 60, dir: -1, timer: 30, cooldown: 150 } ];
            enemies = [createBomb(420, 330, 400, 500)];
        }
        else if (levelNum === 34) {
            platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 300, y: 320, width: 50, height: canvas.height - 320, type: 'pipe' }, { x: 500, y: 460, width: 400, height: 40, type: 'ground' } ];
            turrets = [ { x: 700, y: 400, w: 40, h: 60, dir: -1, timer: 50, cooldown: 140 } ];
            piranhas = [createPiranha(307, 320)];
        }
        else if (levelNum === 35) {
            platforms = [ { x: 0, y: 460, width: 150, height: 40, type: 'ground' }, { x: 300, y: 300, width: 300, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ];
            turrets = [ { x: 800, y: 200, w: 40, h: canvas.height - 200, dir: -1, timer: 10, cooldown: 120 } ]; 
        }
        else if (levelNum === 36) {
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            turrets = [ { x: 50, y: 400, w: 40, h: 60, dir: 1, timer: 90, cooldown: 160 }, { x: 800, y: 400, w: 40, h: 60, dir: -1, timer: 10, cooldown: 160 } ];
            enemies = [createBomb(450, 430, 300, 600)];
        }
        else if (levelNum === 37) {
            platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 350, y: 380, width: 50, height: 20, type: 'block' }, { x: 550, y: 300, width: 50, height: 20, type: 'block' }, { x: 750, y: 460, width: 150, height: 40, type: 'ground' } ];
            turrets = [ { x: 800, y: 300, w: 40, h: canvas.height - 300, dir: -1, timer: 40, cooldown: 130 } ]; 
        }
        else if (levelNum === 38) {
            platforms = [ { x: 0, y: 460, width: 200, height: 40, type: 'ground' }, { x: 300, y: 380, width: 300, height: 20, type: 'block' }, { x: 700, y: 460, width: 200, height: 40, type: 'ground' } ];
            turrets = [ { x: 400, y: 320, w: 40, h: 60, dir: -1, timer: 20, cooldown: 140 }, { x: 500, y: 320, w: 40, h: 60, dir: 1, timer: 90, cooldown: 140 } ];
        }
        else if (levelNum === 39) {
            platforms = [ { x: 0, y: 460, width: 100, height: 40, type: 'ground' }, { x: 200, y: 390, width: 50, height: 20, type: 'block' }, { x: 350, y: 320, width: 50, height: 20, type: 'block' }, { x: 500, y: 280, width: 50, height: 20, type: 'block' }, { x: 800, y: 460, width: 100, height: 40, type: 'ground' } ];
            turrets = [ { x: 800, y: 200, w: 40, h: canvas.height - 200, dir: -1, timer: 10, cooldown: 110 } ];
        }
        else if (levelNum === 40) {
            levelTextUI.innerText = "☠️ LEVEL 40: MEGA TURRET BOSS ☠️";
            platforms = [ { x: 0, y: 460, width: 900, height: 40, type: 'ground' } ];
            boss = { type: 'cannonBoss', x: 700, y: 110, width: 120, height: 350, hp: 5, maxHp: 5, state: 'idle', stateTimer: 50, invulnTimer: 0 };
        }
    }

    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

    function triggerDeath() { if(isDead) return; isDead = true; player.dx = 0; player.dy = -6.5; }

    function update() {
        frameCount++;

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.dx; p.y += p.dy; p.alpha -= p.decay;
            if (p.alpha <= 0) particles.splice(i, 1);
        }

        if (isDead) {
            player.dy += player.gravity; player.y += player.dy;
            if (player.y > canvas.height + 100) loadLevel(currentLevel);
            return;
        }

        if (keys.ArrowRight) player.dx = player.speed;
        else if (keys.ArrowLeft) player.dx = -player.speed;
        else player.dx = 0;

        if (keys.ArrowUp && player.grounded) { player.dy = player.jumpPower; player.grounded = false; }

        player.dy += player.gravity; player.x += player.dx; player.y += player.dy;
        if (player.x < 0) player.x = 0;
        
        if ((currentLevel % 10 === 0) && player.x >= canvas.width - player.width) player.x = canvas.width - player.width; 
        else if (player.x >= canvas.width) { if (currentLevel < 40) { currentLevel++; loadLevel(currentLevel); } }

        if (player.y > canvas.height + 10) triggerDeath();

        player.grounded = false; 
        for (const rect of platforms) {
            if (player.x < rect.x + rect.width && player.x + player.width > rect.x && player.y < rect.y + rect.height && player.y + player.height > rect.y) {
                // Grounding
                if (player.dy > 0 && player.y + player.height - player.dy <= rect.y + 7) { player.grounded = true; player.dy = 0; player.y = rect.y - player.height; }
                
                // Solid Collision (Pipe Wall)
                if (rect.type === 'pipe') {
                    if (player.dx > 0 && player.x + player.width - player.dx <= rect.x) { player.x = rect.x - player.width; } 
                    else if (player.dx < 0 && player.x - player.dx >= rect.x + rect.width) { player.x = rect.x + rect.width; }
                    if (player.dy < 0 && player.y - player.dy >= rect.y + rect.height - 7) { player.dy = 0; player.y = rect.y + rect.height; }
                }
            }
        }
        
        // Turret Solid Collision
        for (const t of turrets) {
            if (player.x < t.x + t.w && player.x + player.width > t.x && player.y < t.y + t.h && player.y + player.height > t.y) {
                if (player.dy > 0 && player.y + player.height - player.dy <= t.y + 7) { player.grounded = true; player.dy = 0; player.y = t.y - player.height; }
                else if (player.dx > 0) player.x = t.x - player.width;
                else if (player.dx < 0) player.x = t.x + t.w;
            }
        }

        for (let p of piranhas) {
            let cycleTimer = (frameCount + p.frameOffset) % 600; p.isOut = false;
            if (cycleTimer < 460) p.y = p.baseY;
            else if (cycleTimer >= 460 && cycleTimer <= 480) { p.y = p.baseY - (p.height * ((cycleTimer - 460) / 20)); p.isOut = true; } 
            else if (cycleTimer > 480 && cycleTimer < 580) { p.y = p.baseY - p.height; p.isOut = true; } 
            else if (cycleTimer >= 580 && cycleTimer <= 600) { p.y = (p.baseY - p.height) + (p.height * ((cycleTimer - 580) / 20)); p.isOut = true; }
            if (p.isOut && player.x < p.x + p.width - 4 && player.x + player.width > p.x + 4 && player.y < p.y + p.height && player.y + player.height > p.y) triggerDeath();
        }

        // Turret Fire Logic
        for (const t of turrets) {
            t.timer--;
            if (t.timer <= 0) {
                enemies.push(createBulletBill(t.x + (t.dir === 1 ? t.w : -36), t.y + 10, t.dir));
                t.timer = t.cooldown;
            }
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            
            if (e.type === 'bullet') {
                if (e.isFalling) { e.y += 5; if(e.y > canvas.height) enemies.splice(i, 1); continue; }
                e.x += e.dx;
                if (e.x > canvas.width + 100 || e.x < -100) { enemies.splice(i, 1); continue; }
                
                if (player.x < e.x + e.width && player.x + player.width > e.x && player.y < e.y + e.height && player.y + player.height > e.y) {
                    if (player.dy > 0 && player.y + player.height - player.dy <= e.y + 12) { 
                        player.dy = player.jumpPower * 1.1; // Jump boost
                        player.grounded = false;
                        e.isFalling = true; e.dx = 0;
                        spawnParticles(e.x + 18, e.y + 10, '#bdc3c7', 10);
                    } else triggerDeath();
                }
            }
            else if (e.type === 'goomba') {
                if (e.isSquished) { e.squishTimer--; if (e.squishTimer <= 0) enemies.splice(i, 1); continue; }
                e.x += e.dx;

                ctx.fillStyle = '#2c3e50'; ctx.fillRect(bx, by, boss.width, boss.height); ctx.fillStyle = '#1a252f'; ctx.fillRect(bx + 10, by, boss.width - 20, boss.height);
                ctx.fillStyle = '#f39c12'; ctx.fillRect(bx, by, boss.width, 15); if (boss.state === 'shoot_sequence' || boss.state === 'vulnerable') { ctx.fillStyle = '#e74c3c'; ctx.fillRect(bx + 20, by - 5, boss.width - 40, 10); } 
                ctx.fillStyle = '#000'; ctx.fillRect(bx - 30, by + 40, 30, 40); ctx.fillRect(bx - 30, by + 140, 30, 40); ctx.fillRect(bx - 30, by + 240, 30, 40); 
                ctx.fillStyle = '#7f2121'; ctx.fillRect(bx, by - 25, boss.width, 8); ctx.fillStyle = '#2ecc71'; ctx.fillRect(bx, by - 25, boss.width * (boss.hp / boss.maxHp), 8);
            }
        }

        // Mario / Gario
        let px = player.x; let py = player.y; let lookDir = player.dx >= 0 ? 1 : -1;
        ctx.fillStyle = '#c0392b'; ctx.fillRect(player.dx >= 0 ? px + 4 : px + 20, py + 18, 8, 12); ctx.fillStyle = '#e52521'; ctx.fillRect(px + 8, py + 16, 16, 12);  ctx.fillStyle = '#0952cb'; ctx.fillRect(px + 6, py + 22, 20, 16); 
        ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(px + 16, py + 11, 10, 0, Math.PI*2); ctx.fill(); 
        if (isDead) { ctx.fillStyle = '#000'; ctx.font = '12px bold Arial'; ctx.fillText('X X', px + 7, py + 14); } 
        else { ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(px + 16 + (lookDir*4), py + 8, 3.5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(px + 16 + (lookDir*5), py + 8, 1.5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'black'; ctx.fillRect(px + 16 + (lookDir * 4) - 5, py + 11, 10, 3); }
        ctx.fillStyle = '#e52521'; ctx.beginPath(); ctx.arc(px + 16, py + 5, 10, Math.PI, 0); ctx.fill(); ctx.fillRect(px + 16 + (lookDir*4) - 7, py + 2, 14, 3); ctx.fillStyle = '#5c2d00'; ctx.beginPath(); ctx.ellipse(px + 10, py + 42, 6, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(px + 22, py + 42, 6, 4, 0, 0, Math.PI*2); ctx.fill();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    loadLevel(currentLevel); gameLoop();
</script>
