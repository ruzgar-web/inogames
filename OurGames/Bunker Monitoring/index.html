<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNKER MONITORING - FATAL ERROR</title>
    <style>
        :root { --neon-green: #00ff66; --dark-green: #002208; --alert-red: #ff0033; --panel-bg: #030407; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; user-select: none; }
        body { background-color: #000; color: #cbd5e1; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }

        /* BAŞLANGIÇ EKRANI */
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a0000 0%, #000 100%); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { background: #000; color: #ff0033; border: 2px solid #ff0033; padding: 25px 60px; font-size: 2.5rem; font-weight: 900; cursor: pointer; border-radius: 5px; transition: 0.1s; letter-spacing: 2px; }
        #start-btn:hover { background: #ff0033; color: #000; transform: scale(1.05); }

        /* ANA TERMİNAL */
        #terminal-main { width: 100%; max-width: 1700px; height: 95vh; background: var(--panel-bg); border: 2px solid #111; display: grid; grid-template-columns: 3.8fr 1fr; grid-template-rows: 50px 1fr; gap: 20px; padding: 20px; box-shadow: inset 0 0 50px #000; display: none; position: relative; }
        header { grid-column: 1 / -1; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; color: #444; font-weight: bold; padding-bottom: 10px; }
        header span.highlight { color: var(--neon-green); }

        #viewport-container { background: #000; border: 5px solid #050505; position: relative; overflow: hidden; display: flex; }

        /* TEHDİT ARAYÜZÜ */
        #threat-panel { position: absolute; top: 20px; right: 20px; background: rgba(5,5,5,0.95); border: 1px solid #333; padding: 20px; z-index: 70; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        
        .status-title { font-size:0.9rem; font-weight:bold; color:#888; display:flex; justify-content:space-between; margin-bottom: 5px; }
        
        #global-bar-bg { width: 100%; height: 25px; background: #111; border: 1px solid #222; position: relative; margin-bottom: 20px; }
        #global-bar-fill { width: 0%; height: 100%; background: #ff0033; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px #ff0033; }
        
        #threat-location { font-size: 1.3rem; color: #d97706; font-weight: 900; margin-bottom: 12px; display: none; text-shadow: 0 0 10px #d97706; letter-spacing: 1px; text-align: center; }
        #timer-box { font-size: 2.5rem; color: #fff; text-align: center; font-weight: bold; padding: 10px; background: #111; border: 1px solid #333; display: none; }

        /* KEPENKLER */
        .purge-door { position: absolute; left: 0; width: 100%; height: 50.5%; background: #0a0a0a; border: 4px solid #111; background-image: repeating-linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111); background-size: 40px 40px; z-index: 80; transition: transform 0.15s ease-in-out; }
        #door-top { top: 0; transform: translateY(-100%); border-bottom: 10px solid #d97706; }
        #door-bottom { bottom: 0; transform: translateY(100%); border-top: 10px solid #d97706; }
        .doors-closed #door-top, .doors-closed #door-bottom { transform: translateY(0); }

        /* KAMERA OVERLAY EFEKTLERİ */
        #crt-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 60; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.95) 100%); pointer-events: none; z-index: 65; }

        /* JUMPSCARE LAYER (KORUNDU VE ASLA DOKUNULMADI) */
        #jumpscare-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 95; display: none; justify-content: center; align-items: center; overflow: hidden; background: #fff; animation: strobeFlash 0.1s infinite; }
        
        @keyframes strobeFlash {
            0% { background: #000; filter: invert(0); }
            50% { background: #fff; filter: invert(1); }
            100% { background: #f00; filter: invert(0); }
        }

        .nightmare-face { width: 150%; height: 150%; animation: violentShake 0.05s infinite; }

        @keyframes violentShake {
            0% { transform: translate(20px, -20px) scale(1.1) rotate(2deg); }
            50% { transform: translate(-20px, 20px) scale(1.2) rotate(-2deg); }
            100% { transform: translate(15px, 15px) scale(1.1) rotate(1deg); }
        }

        /* ANOMALİ ANİMASYONLARI */
        .anomaly-layer { display: none; z-index: 50; position: relative; }
        .pulse-meat { animation: meatPulse 1s infinite alternate; transform-origin: center; }
        @keyframes meatPulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        
        .twitch-body { animation: bodyTwitch 0.2s infinite; }
        @keyframes bodyTwitch { 0% { transform: translateX(0); } 50% { transform: translateX(5px) rotate(1deg); } 100% { transform: translateX(-2px); } }
        
        .led-blink { animation: ledBlink 0.5s infinite alternate; }
        @keyframes ledBlink { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        svg.main-screen { width: 100%; height: 100%; }

        /* YAN MENÜ */
        #sidebar-controls { display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .matrix-btn { background: #050505; color: #555; border: 1px solid #222; padding: 25px 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: left; display: flex; flex-direction: column; gap: 8px; transition: 0.1s; }
        .matrix-btn span { font-size: 0.8rem; color: #444; }
        .matrix-btn.active { background: #081208; color: var(--neon-green); border-color: var(--neon-green); border-left: 10px solid var(--neon-green); }
        
        #purge-btn { margin-top: auto; background: #000; color: #d97706; border: 2px solid #d97706; padding: 35px 20px; font-size: 1.5rem; font-weight: 900; cursor: pointer; transition: 0.1s; }
        #purge-btn:hover { background: #d97706; color: #000; }

        #lockdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050000; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>

        <button class="matrix-btn" id="b-2" onclick="selectCamera(2)">[CAM 02] LAB AREA</button>
        <button class="matrix-btn" id="b-3" onclick="selectCamera(3)">[CAM 03] STORAGE</button>
        <button class="matrix-btn" id="b-4" onclick="selectCamera(4)">[CAM 04] BOILER</button>
        <button id="purge-btn" onclick="executePurge()">[ PURIFY ]</button>
    </div>

    <div id="lockdown-overlay">
        <h1 style="font-size: 8rem; color:red; margin-bottom: 20px; font-weight: 900;">YOU'RE DEAD</h1>
        <p id="survival-time" style="font-size: 1.5rem; color: #888;"></p>
        <button style="margin-top: 50px; background: transparent; border: 3px solid red; color: red; padding: 20px 40px; font-size: 2rem; cursor:pointer;" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
    let currentCamera = 1;
    let anomalyActive = false;
    let currentAnomalyRoom = 0;
    
    let globalContamination = 0; 
    let timeToCatch = 3; 
    let localTimerInterval = null;
    let spawnTimer = null;
    
    let totalTime = 0;
    let timeInterval = null;
    let isActionLocked = false; 
    let isGameOver = false;

    // AUDIO KONTROLLERİ (SES SENTEZLEYİCİSİ)
    let audioCtx = null;
    let ambientOsc = null;
    let ambientGain = null;
    let ambientLFO = null;

    function initGame() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('terminal-main').style.display = 'grid';
        if(document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(e=>{}); }
        
        // Arka plan gerici sesini başlat
        startAmbientSound();

        timeInterval = setInterval(() => { 
            totalTime++; 
            document.getElementById('timer-count').innerText = totalTime; 
        }, 1000);
        
        scheduleAnomaly();
    }

    function startAmbientSound() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Derinden gelen korkunç uğultu (Drone)
            ambientOsc = audioCtx.createOscillator();
            ambientGain = audioCtx.createGain();
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime); // Çok boğuk ve bas bir frekans
            
            // Uğultuyu dalgalandıran LFO (Gerilim efekti)
            ambientLFO = audioCtx.createOscillator();
            let lfoGain = audioCtx.createGain();
            ambientLFO.frequency.setValueAtTime(0.8, audioCtx.currentTime); // Yavaş ritim
            lfoGain.gain.setValueAtTime(8, audioCtx.currentTime); 
            
            // Düşük frekans filtresi (Sesi boğmak için)
            let lpFilter = audioCtx.createBiquadFilter();
            lpFilter.type = 'lowpass';
            lpFilter.frequency.setValueAtTime(120, audioCtx.currentTime);

            ambientLFO.connect(lfoGain);
            lfoGain.connect(ambientOsc.frequency);
            
            ambientGain.gain.setValueAtTime(0.25, audioCtx.currentTime); // Arka planda kalacak ama gerecek seviye
            
            ambientOsc.connect(lpFilter);
            lpFilter.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            
            ambientLFO.start();
            ambientOsc.start();
        } catch(e) { console.log("Ses motoru başlatılamadı:", e); }
    }

    function selectCamera(id) {
        if (isActionLocked || isGameOver) return;
        
        document.querySelectorAll('.matrix-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`b-${id}`).classList.add('active');

        for(let i=1; i<=4; i++) {
            document.getElementById(`room-${i}`).style.display = 'none';
        }
        document.getElementById(`room-${id}`).style.display = 'block';
        currentCamera = id;
    }

    function scheduleAnomaly() {
        if(isGameOver) return;
        const delay = Math.floor(Math.random() * 3000) + 3000; 
        spawnTimer = setTimeout(spawnAnomaly, delay);
    }

    function spawnAnomaly() {
        if(anomalyActive || isGameOver) return;
        
        currentAnomalyRoom = Math.floor(Math.random() * 4) + 1;
        document.getElementById(`anom-${currentAnomalyRoom}-0`).style.display = 'block';

        anomalyActive = true;
        timeToCatch = 3; 
        
        document.getElementById('threat-location').style.display = 'block';
        document.getElementById('timer-box').style.display = 'block';
        document.getElementById('timer-box').innerText = `${timeToCatch}s`;

        localTimerInterval = setInterval(() => {
            timeToCatch--;
            document.getElementById('timer-box').innerText = `${timeToCatch}s`;
            
            if(timeToCatch <= 0) {
                clearInterval(localTimerInterval);
                applyPenalty();
            }
        }, 1000);
    }

    function executePurge() {
        if (isActionLocked || isGameOver) return;
        
        isActionLocked = true; 
        document.getElementById('viewport-container').classList.add('doors-closed');
        
        setTimeout(() => {
            if (anomalyActive) {
                if (currentCamera === currentAnomalyRoom) {
                    clearInterval(localTimerInterval);
                    clearAnomalyVisuals();
                    setTimeout(() => { 
                        isActionLocked = false; 
                        scheduleAnomaly(); 
                    }, 3000);
                } else {
                    clearInterval(localTimerInterval);
                    applyPenalty();
                }
            } else {
                setTimeout(() => { isActionLocked = false; }, 3000);
            }
            
            setTimeout(() => {
                document.getElementById('viewport-container').classList.remove('doors-closed');
            }, 500);
        }, 500);
    }

    function applyPenalty() {
        clearAnomalyVisuals();
        
        globalContamination += 34; 
        document.getElementById('global-text').innerText = `%${globalContamination}`;
        document.getElementById('global-bar-fill').style.width = `${Math.min(globalContamination, 100)}%`;

        if (globalContamination >= 100) {
            triggerJumpscare();
        } else {
            setTimeout(() => {
                isActionLocked = false;
                scheduleAnomaly();
            }, 3000);
        }
    }

    function clearAnomalyVisuals() {
        anomalyActive = false;
        if(currentAnomalyRoom !== 0) {
            document.getElementById(`anom-${currentAnomalyRoom}-0`).style.display = 'none';
        }
        document.getElementById('threat-location').style.display = 'none';
        document.getElementById('timer-box').style.display = 'none';
    }

    function triggerJumpscare() {
        if(isGameOver) return;
        isGameOver = true;
        clearInterval(timeInterval);
        clearTimeout(spawnTimer);
        
        // Arka plan sesini tamamen sustur
        try {
            if (ambientOsc) ambientOsc.stop();
            if (ambientLFO) ambientLFO.stop();
        } catch(e){}

        const jumpLayer = document.getElementById('jumpscare-layer');
        jumpLayer.style.display = 'flex';
        
        // 2 KAT DAHA ŞİDDETLİ KORKUNÇ JUMPSCARE ÇIĞLIĞI
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Katman 1: Yırtıcı Kalın Çığlık
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(90, audioCtx.currentTime);
            osc1.frequency.linearRampToValueAtTime(5000, audioCtx.currentTime + 0.1); 
            osc1.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.8);
            
            // Katman 2: Kulak Tırmalayan Metalik Metal Sesi
            let osc2 = audioCtx.createOscillator();
            let gain2 = audioCtx.createGain();
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(1500, audioCtx.currentTime);
            osc2.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.6);

            // Katman 3: Şiddetli Beyaz Gürültü (Statik Patlama)
            let bufferSize = audioCtx.sampleRate * 2;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            let noiseGain = audioCtx.createGain();

            // Orta frekansları şişiren distorsiyon filtresi (Sesi iğrençleştirmek için)
            let distortionFilter = audioCtx.createBiquadFilter();
            distortionFilter.type = 'peaking';
            distortionFilter.frequency.value = 1200;
            distortionFilter.Q.value = 12;
            distortionFilter.gain.value = 18; // Şiddetli distorsiyon kazancı

            // ÇOK YÜKSEK DESİBEL AYARLARI (Öncekinin tam 2 katı kazanç)
            gain1.gain.setValueAtTime(2.0, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
            
            gain2.gain.setValueAtTime(1.5, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            
            noiseGain.gain.setValueAtTime(2.0, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);

            // Bağlantılar
            osc1.connect(distortionFilter);
            osc2.connect(distortionFilter);
            noise.connect(noiseGain);
            noiseGain.connect(distortionFilter);
            
            distortionFilter.connect(audioCtx.destination);
            
            osc1.start(); osc2.start(); noise.start();
            osc1.stop(audioCtx.currentTime + 2);
            osc2.stop(audioCtx.currentTime + 2);
            noise.stop(audioCtx.currentTime + 2);
        } catch(e) {}

        setTimeout(() => {
            document.getElementById('survival-time').innerText = `SURVIVAL: ${totalTime} SECOND`;
            document.getElementById('lockdown-overlay').style.display = 'flex';
        }, 1200);
    }
</script>
</body>
</html>
